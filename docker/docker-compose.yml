services:
  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: web3pay
      POSTGRES_USER: web3pay
      POSTGRES_PASSWORD: web3pay_secret_2026
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  # Redis
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  # Backend API
  api:
    build: /root/web3pay/backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://web3pay:web3pay_secret_2026@postgres:5432/web3pay
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: chainpay-secret-key-change-in-production-2026
      RPC_URL_ETH: https://eth.llamarpc.com
      RPC_URL_BSC: https://bsc-dataseed.binance.org
      RPC_URL_POLYGON: https://polygon-rpc.com
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  # Chain Listener
  listener:
    build: /root/web3pay/backend
    command: python -m app.listener
    environment:
      DATABASE_URL: postgresql+asyncpg://web3pay:web3pay_secret_2026@postgres:5432/web3pay
      REDIS_URL: redis://redis:6379/0
      RPC_URL_ETH: https://eth.llamarpc.com
      RPC_URL_BSC: https://bsc-dataseed.binance.org
      RPC_URL_POLYGON: https://polygon-rpc.com
    depends_on:
      - postgres
      - redis
      - api
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: /root/web3pay/frontend
      args:
        NEXT_PUBLIC_API_URL: http://45.76.190.83:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    ports:
      - "8889:80"
    volumes:
      - /root/web3pay/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - api
    restart: unless-stopped

volumes:
  pgdata:
