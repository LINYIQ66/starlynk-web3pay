version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: web3pay
      POSTGRES_USER: web3pay
      POSTGRES_PASSWORD: web3pay_secret_2026
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U web3pay"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8081:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://web3pay:web3pay_secret_2026@postgres:5432/web3pay
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-chainpay-secret-key-change-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      ADMIN_ADDRESSES: ${ADMIN_ADDRESSES:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  listener:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: python -m app.listener
    environment:
      DATABASE_URL: postgresql+asyncpg://web3pay:web3pay_secret_2026@postgres:5432/web3pay
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-chainpay-secret-key-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8081/api/v1
    restart: unless-stopped

volumes:
  pgdata:
